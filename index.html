            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 4px 24px #ffb6b9, 0 1.5px 0 #333;
            margin-bottom: 0.5em;
            animation: popIn 1s cubic-bezier(.68,-0.55,.27,1.55);

        .paw {

            animation: bounce 1.2s infinite alternate;
            display: inline-block;
            margin: 0 0.2em;
        }
        @keyframes popIn {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            80% { transform: scale(1.1) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes bounce {
            0% { transform: translateY(0); }

        }
        .card {
            background: rgba(255,255,255,0.85);
            border-radius: 1.5em;

            padding: 2em 3em;
            margin-top: 1em;
            animation: fadeInUp 1.2s cubic-bezier(.68,-0.55,.27,1.55);
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .glow-btn {
            margin-top: 1.5em;
            padding: 1em 2.5em;
            font-size: 1.3rem;
            border: none;
            border-radius: 2em;
            background: linear-gradient(90deg, #ffb6b9, #fcdffb);
            color: #fff;
            box-shadow: 0 0 20px #ffb6b9, 0 0 40px #fcdffb;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        .glow-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px #ffb6b9, 0 0 80px #fcdffb;
        }
    </style>
